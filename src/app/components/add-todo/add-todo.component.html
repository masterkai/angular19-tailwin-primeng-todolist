<div class="flex flex-row gap-3 my-3">
  <div class="card flex justify-center">
    <input type="text" pInputText [(ngModel)]="title" required />
  </div>
  <p-button
    (click)="addTodo()"
    label="Add"
    type="submit"
    icon="pi pi-plus"
  ></p-button>
</div>
@if (addTodoMutation.isPending()) {
  <div>Adding...</div>
}
@if (addTodoMutation.isError()) {
  <div>Error: {{ addTodoMutation.error().message }}</div>
}
@if (addTodoMutation.isSuccess()) {
  <div>Todo added!</div>
}
